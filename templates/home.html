<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== Page Layout ===== */

body {
    background-color: #343541;
    color: white;
    height: 100vh;
    margin: 0;
    display: flex;
}

/* ===== Sidebar ===== */

.sidebar {
    width: 250px;
    background-color: #202123;
    padding: 15px;
}

.sidebar h4 {
    color: white;
}

/* ===== Main Chat Area ===== */

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Chat messages container */

.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* User message */

.user-message {
    background-color: #3e3f4b;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    max-width: 80%;
}

/* AI message */

.ai-message {
    background-color: #444654;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    max-width: 80%;
}

/* ===== Input Area ===== */

.input-area {
    padding: 15px;
    background-color: #40414f;
}

.input-box {
    width: 100%;
    border-radius: 8px;
    padding: 10px;
    border: none;
}

.send-btn {
    margin-left: 10px;
}

</style>
</head>

<body>

<!-- ===== Sidebar ===== -->

<div class="sidebar">

    <h4>🤖 My AI</h4>

    <hr>

    <p>Chat History</p>

</div>


<!-- ===== Main Chat ===== -->

<div class="main">

    <!-- Chat Messages -->

    <div class="chat-container" id="chatBox">

        <!-- Show user query -->
        {% if response %}

        <div class="user-message">
            <b>You:</b><br>
            {{ request.form.query }}
        </div>

        <div class="ai-message">
            <b>AI:</b><br>
            {{ response }}
        </div>

        {% else %}

        <div class="text-center mt-5">
            <h3>Ask anything...</h3>
        </div>

        {% endif %}

    </div>


    <!-- Input Area -->

    <div class="input-area">

        <form method="POST" action="/" class="d-flex">

            <input 
                type="text"
                name="query"
                class="input-box"
                placeholder="Type your question..."
                required
            >

            <button 
                class="btn btn-success send-btn"
                type="submit">

                Send

            </button>

        </form>

    </div>

</div>


<script>

/* Auto scroll to bottom */

var chatBox = document.getElementById("chatBox");

chatBox.scrollTop = chatBox.scrollHeight;

</script>

</body>
</html>
